<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BP Tracker</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>❤️</text></svg>">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/mobile-select@1.4.0/dist/style/mobile-select.css">
    <style>
        body { font-family: system-ui, sans-serif; padding: 20px; background: #f4f4f9; text-align: center; }
        .card { background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .trigger { font-size: 24px; font-weight: bold; padding: 15px; border: 1px solid #ddd; border-radius: 8px; margin: 10px 0; background: #fafafa; cursor: pointer; }
        .label { font-size: 14px; color: #666; }
        button { background: #007bff; color: #fff; border: none; padding: 15px 30px; font-size: 18px; border-radius: 8px; width: 100%; cursor: pointer; font-weight: bold; }
        button:disabled { background: #ccc; }
        #status { margin-top: 15px; color: green; font-weight: bold; display: none; }
    </style>
</head>
<body>
    <div class="card">
        <div class="label">SYS (mmHg)</div>
        <div id="sys-trigger" class="trigger">120</div>
        
        <div class="label">DIA (mmHg)</div>
        <div id="dia-trigger" class="trigger">80</div>
        
        <div class="label">PULSE (bpm)</div>
        <div id="pulse-trigger" class="trigger">70</div>
    </div>
    
    <button id="save-btn">Save to Sheets</button>
    <div id="status">Saved successfully!</div>
    <script src="https://cdn.jsdelivr.net/npm/mobile-select@1.4.0/dist/mobile-select.iife.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
