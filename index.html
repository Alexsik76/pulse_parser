<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BP Tracker</title>
    <link rel="icon" type="image/png" href="https://img.icons8.com/color/48/hearts.png">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/mobile-select@1.4.0/dist/style/mobile-select.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <button id="info-btn" aria-label="Show Treatment Schema">
            <svg width="24" height="24"><use href="icons.svg#icon-info"></use></svg>
        </button>
    </header>

    <main>
        <div id="info-modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
            <div class="modal-content">
                <h2 id="modal-title">
                    Схема прийому
                    <button id="close-modal" aria-label="Close">
                        <svg width="24" height="24"><use href="icons.svg#icon-close"></use></svg>
                    </button>
                </h2>
                
                <label for="schema-selector" class="visually-hidden">Select Schema</label>
                <select id="schema-selector">
                    <option value="">Loading schemas...</option>
                </select>

                <hr>
                
                <div id="schema-content">
                    <p class="placeholder-text">Select a schema to see details</p>
                </div>
            </div>
        </div>

        <section class="card" aria-labelledby="tracker-title">
            <h1 id="tracker-title" class="visually-hidden">Blood Pressure Tracker</h1>
            
            <div class="input-group">
                <label for="sys-trigger" class="label">SYS (mmHg)</label>
                <button id="sys-trigger" class="trigger">120</button>
            </div>
            
            <div class="input-group">
                <label for="dia-trigger" class="label">DIA (mmHg) </label>
                <button id="dia-trigger" class="trigger">80</button>
            </div>
            
            <div class="input-group">
                <label for="pulse-trigger" class="label">PULSE (bpm)</label>
                <button id="pulse-trigger" class="trigger">70</button>
            </div>
        </section>
        
        <button id="save-btn">Save to Sheets</button>

        <section class="card" aria-labelledby="chart-title">
            <h2 id="chart-title" class="label">History Chart</h2>
            <canvas id="bpChart"></canvas>
        </section>

        <div id="status" role="status" aria-live="polite">Saved successfully!</div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/mobile-select@1.4.0/dist/mobile-select.iife.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="app.js"></script>
</body>
</html>
